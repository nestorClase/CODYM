<!DOCTYPE html>
<html lang="en">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Nav</title>
    <link rel="stylesheet" href="/CODYM/css/styles.css"/>
    <link rel="stylesheet" href="/CODYM/css/menu.css"/>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
      <div class="container-fluid">
        <img src="/CODYM/imagenes/logo.jpg" alt="Logo gymnasio"> 
      </div>
      <div class="search-bar">
        <img src="/CODYM/imagenes/lupa.png" alt="Imagen lupa" class="search-icon"/>
        <input type="text" placeholder="Search...">
    </div>
      <div class="social-icons">
        <a href="#"><img src="/CODYM/imagenes/linkedin-removebg-preview.png" class="social-icons" alt="LinkedIn"></a>
        <a href="#"><img src="/CODYM/imagenes/twitter-removebg-preview.png" class="social-icons" alt="Twitter"></a>
        <a href="#"><img src="/CODYM/imagenes/instagram-removebg-preview.png" class="social-icons" alt="Instagram"></a>
        <a href="#"><img src="/CODYM/imagenes/facebook-removebg-preview.png" class="social-icons" alt="Facebook"></a>
    </div>
  </nav>
</head>
<body>
<section class="Menu">
  <div id="sidebar">
    <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Acerca de</a></li>
        <li><a href="#">Contacto</a></li>
    </ul>
</div>
<div class="container">
    <button id="sidebarToggle" class="btn btn-primary mt-3">Toggle Menu</button>
</div>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
    document.getElementById('sidebarToggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('active');
    });
</script>
</section>
</body>
</html>
